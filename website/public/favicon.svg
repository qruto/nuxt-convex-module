<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Nuxt backend">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop class="a" offset="0" stop-color="#ff7a3c"/>
      <stop class="b" offset="1" stop-color="#f0420a"/>
    </linearGradient>
  </defs>
  <style>
    @media (prefers-color-scheme: dark) {
      .a { stop-color: #ff8a52; }
      .b { stop-color: #ff5a1f; }
    }
  </style>
  <!-- Rounded depth tile, lit from the top-left. -->
  <rect width="100" height="100" rx="26" fill="url(#tile)"/>
  <rect x="1.5" y="1.5" width="97" height="97" rx="24.5" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2"/>
  <!-- Layered-stack mark: many backend services unified into one stack. -->
  <path d="M50 20 82 38 50 56 18 38Z" fill="#ffffff"/>
  <path d="M18 50 50 68 82 50" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <path d="M18 62 50 80 82 62" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
</svg>
